workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: MindEase App Store
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mindease.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    
    scripts:
      - name: Install npm dependencies
        script: npm ci
      
      - name: Build Next.js app
        script: npm run build
      
      - name: Add iOS platform
        script: npx cap add ios || true
      
      - name: Sync Capacitor
        script: npx cap sync ios
      
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      
      - name: Increment build number
        script: |
          cd ios/App
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0)
          agvtool new-version -all $((LATEST_BUILD + 1))
      
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/App/Info.plist
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false  # Set to true for production
        
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # Android build (bonus!)
  android-release:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      android_signing:
        - mindease_keystore
      vars:
        PACKAGE_NAME: "com.mindease.app"
      node: 20
    
    scripts:
      - name: Install npm dependencies
        script: npm ci
      
      - name: Build Next.js app
        script: npm run build
      
      - name: Add Android platform
        script: npx cap add android || true
      
      - name: Sync Capacitor
        script: npx cap sync android
      
      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.aab
    
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
